<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkVerwaltung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .table a { text-decoration: none; }
        .btn-delete { color: #dc3545; cursor: pointer; }
        .btn-delete:hover { color: #a71d2a; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">LinkVerwaltung</h1>

    <!-- Formular -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title" th:text="${link.id != null} ? 'Link bearbeiten' : 'Neuen Link hinzufuegen'">Neuen Link hinzufuegen</h5>
            <form th:action="@{/speichern}" th:object="${link}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{erstelltAm}">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="url" class="form-label">URL *</label>
                        <input type="url" class="form-control" id="url" th:field="*{url}"
                               placeholder="https://..." required>
                    </div>
                    <div class="col-md-4">
                        <label for="titel" class="form-label">Titel</label>
                        <input type="text" class="form-control" id="titel" th:field="*{titel}"
                               placeholder="Titel des Links">
                    </div>
                    <div class="col-md-3">
                        <label for="channel" class="form-label">Channel</label>
                        <input type="text" class="form-control" id="channel" th:field="*{channel}"
                               placeholder="z.B. YouTube-Kanal">
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Speichern</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Suche -->
    <form th:action="@{/}" method="get" class="mb-3">
        <div class="input-group">
            <input type="text" class="form-control" name="suche" th:value="${suche}"
                   placeholder="Suche nach Titel, Channel oder URL...">
            <button type="submit" class="btn btn-outline-secondary">Suchen</button>
            <a th:href="@{/}" class="btn btn-outline-secondary">Alle anzeigen</a>
        </div>
    </form>

    <!-- Tabelle -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Titel</th>
                    <th>Channel</th>
                    <th>URL</th>
                    <th>Erstellt am</th>
                    <th>Aktionen</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="l, iter : ${links}">
                    <td th:text="${iter.count}"></td>
                    <td th:text="${l.titel}"></td>
                    <td th:text="${l.channel}"></td>
                    <td>
                        <a th:href="${l.url}" target="_blank" rel="noopener"
                           th:text="${#strings.abbreviate(l.url, 50)}"></a>
                    </td>
                    <td th:text="${#temporals.format(l.erstelltAm, 'dd.MM.yyyy HH:mm')}"></td>
                    <td>
                        <a th:href="@{/bearbeiten/{id}(id=${l.id})}" class="btn btn-sm btn-outline-primary me-1">Bearbeiten</a>
                        <a th:href="@{/loeschen/{id}(id=${l.id})}" class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Wirklich loeschen?')">Loeschen</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(links)}">
                    <td colspan="6" class="text-center text-muted py-4">Noch keine Links vorhanden.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <p class="text-muted mt-3 small">
        <span th:text="${#lists.size(links)}">0</span> Link(s) gespeichert
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
