<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LinkVerwaltung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-card { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">LinkVerwaltung</h3>

                <div id="errorMsg" class="alert alert-danger d-none">
                    Benutzername oder Passwort falsch.
                </div>
                <div id="logoutMsg" class="alert alert-success d-none">
                    Erfolgreich abgemeldet.
                </div>

                <form action="/login" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Benutzername</label>
                        <input type="text" class="form-control" id="username" name="username" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Passwort</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Anmelden</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Fehlermeldung oder Logout-Nachricht anzeigen
    const params = new URLSearchParams(window.location.search);
    if (params.has('error')) {
        document.getElementById('errorMsg').classList.remove('d-none');
    }
    if (params.has('logout')) {
        document.getElementById('logoutMsg').classList.remove('d-none');
    }
</script>
</body>
</html>
