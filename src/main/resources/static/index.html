<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkVerwaltung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .table a { text-decoration: none; }
        .btn-delete { color: #dc3545; cursor: pointer; }
        .btn-delete:hover { color: #a71d2a; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">LinkVerwaltung</h1>

    <!-- Formular -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title" id="formTitel">Neuen Link hinzufuegen</h5>
            <form id="linkForm">
                <input type="hidden" id="linkId">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="url" class="form-label">URL *</label>
                        <input type="url" class="form-control" id="url" placeholder="https://..." required>
                    </div>
                    <div class="col-md-4">
                        <label for="titel" class="form-label">Titel</label>
                        <input type="text" class="form-control" id="titel" placeholder="Titel des Links">
                    </div>
                    <div class="col-md-3">
                        <label for="channel" class="form-label">Channel</label>
                        <input type="text" class="form-control" id="channel" placeholder="z.B. YouTube-Kanal">
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Speichern</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Suche -->
    <div class="mb-3">
        <div class="input-group">
            <input type="text" class="form-control" id="suche" placeholder="Suche nach Titel, Channel oder URL...">
            <button class="btn btn-outline-secondary" id="btnSuchen">Suchen</button>
            <button class="btn btn-outline-secondary" id="btnAlle">Alle anzeigen</button>
        </div>
    </div>

    <!-- Tabelle -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Titel</th>
                    <th>Channel</th>
                    <th>URL</th>
                    <th>Erstellt am</th>
                    <th>Aktionen</th>
                </tr>
                </thead>
                <tbody id="linkTabelle">
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <p class="text-muted small mb-0">
            <span id="anzahl">0</span> Link(s) gespeichert
        </p>
        <a href="/api/links/export/csv" class="btn btn-sm btn-outline-success">CSV Export</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = '/api/links';

    // --- Links laden ---
    async function ladeLinks(suche) {
        const url = suche ? `${API}?suche=${encodeURIComponent(suche)}` : API;
        const res = await fetch(url);
        const links = await res.json();
        zeigeLinks(links);
    }

    // --- Links in Tabelle anzeigen ---
    function zeigeLinks(links) {
        const tbody = document.getElementById('linkTabelle');
        document.getElementById('anzahl').textContent = links.length;

        if (links.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Noch keine Links vorhanden.</td></tr>';
            return;
        }

        tbody.innerHTML = links.map((link, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${esc(link.titel)}</td>
                <td>${esc(link.channel)}</td>
                <td><a href="${esc(link.url)}" target="_blank" rel="noopener">${kuerze(link.url, 50)}</a></td>
                <td>${formatDatum(link.erstelltAm)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="bearbeiten(${link.id})">Bearbeiten</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="loeschen(${link.id})">Loeschen</button>
                </td>
            </tr>
        `).join('');
    }

    // --- Link speichern (neu oder aktualisieren) ---
    document.getElementById('linkForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('linkId').value;
        const daten = {
            url: document.getElementById('url').value,
            titel: document.getElementById('titel').value,
            channel: document.getElementById('channel').value
        };

        if (id) {
            await fetch(`${API}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(daten)
            });
        } else {
            await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(daten)
            });
        }

        formZuruecksetzen();
        ladeLinks();
    });

    // --- Link bearbeiten ---
    async function bearbeiten(id) {
        const res = await fetch(`${API}/${id}`);
        const link = await res.json();
        document.getElementById('linkId').value = link.id;
        document.getElementById('url').value = link.url;
        document.getElementById('titel').value = link.titel || '';
        document.getElementById('channel').value = link.channel || '';
        document.getElementById('formTitel').textContent = 'Link bearbeiten';
        document.getElementById('url').focus();
    }

    // --- Link loeschen ---
    async function loeschen(id) {
        if (!confirm('Wirklich loeschen?')) return;
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        ladeLinks();
    }

    // --- Suche ---
    document.getElementById('btnSuchen').addEventListener('click', () => {
        ladeLinks(document.getElementById('suche').value);
    });
    document.getElementById('suche').addEventListener('keyup', (e) => {
        if (e.key === 'Enter') ladeLinks(document.getElementById('suche').value);
    });
    document.getElementById('btnAlle').addEventListener('click', () => {
        document.getElementById('suche').value = '';
        ladeLinks();
    });

    // --- Hilfsfunktionen ---
    function formZuruecksetzen() {
        document.getElementById('linkForm').reset();
        document.getElementById('linkId').value = '';
        document.getElementById('formTitel').textContent = 'Neuen Link hinzufuegen';
    }

    function esc(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function kuerze(str, max) {
        if (!str) return '';
        return str.length > max ? esc(str.substring(0, max - 3)) + '...' : esc(str);
    }

    function formatDatum(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })
            + ' ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }

    // --- Start ---
    ladeLinks();
</script>
</body>
</html>
